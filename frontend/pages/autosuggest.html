<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSuggest</title>
    <link rel="stylesheet" href="../css/autosuggest.css">
</head>
<body>
    <span class="gear">&#x2699;</span> <!--for adding icons-->
    <span class="pill"><span class="bullet">&#x2022;</span> online | &#x23F0; - ms</span> <!-- doesn't move to the next line like div -->
    <div class="content">
        <h1><span class="title">Auto</span>Suggest</h1>
        <p class="tagline"> One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>
        <div>
            <span class="lens">&#x1F50D;</span>
            <input type="text" class="search-box" placeholder="Start typing to search phrases" id="search-bar"></p>
            <div id="search-suggestions"> <!-- shortcut = #search-suggestions-->
                
            </div>
        </div>
    </div>
    <script src="../js/autosuggest.js"></script>
    </body>
</html>
